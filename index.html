<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reels</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css"
    rel="stylesheet"/>
</head>
<body>
    <main>
        <section>
            <div class="all-reels">
                <div class="reels">
                    <video autoplay muted loop src="./reel-videos/video1.mp4"></video>
                    <div class="bottom">
                        <div class="user">
                            <img src="https://images.pexels.com/photos/2787341/pexels-photo-2787341.jpeg" alt="">                            <h4>UserName</h4>
                            <button>Follow</button>
                        </div>
                        <h3>Title for sample anything can be added</h3>
                    </div>
                    <div class="right">
                        <div class="like">
                            <h4 class="like-icon"><i class="ri-heart-3-line"></i></h4>
                            <h6>200</h6>
                        </div>
                        <div class="comment">
                            <h4 class="commet-icon"><i class="ri-chat-3-line"></i></h4>
                            <h6>200</h6>
                        </div>
                        <div class="share">
                            <h4 class="share-icon"><i class="ri-share-forward-line"></i></h4>
                            <h6>200</h6>
                        </div>
                        <div class="menu">
                            <h4 class="menu-icon"><i class="ri-more-2-fill"></i></h4>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
